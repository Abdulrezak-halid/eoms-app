<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="%VITE_APP_NAME%" />
    <meta name="color-scheme" content="light dark" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180.webp" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>%VITE_APP_NAME% [%VITE_ENV_NAME%]</title>

    <!--Critical CSS for Initial Bootloader-->
    <style>
      .initial-loader {
        position: absolute;
        top: 0;
        bottom: 0;
        right: 0;
        left: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .initial-loader-msg {
        margin-top: 1rem;
        line-height: 1rem;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #f3f4f6; /* gray-100 */
        border-bottom-color: transparent;
        border-radius: 50%;
        display: inline-block;
        box-sizing: border-box;
        animation: rotation 1s linear infinite;
      }
      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <!-- Slate 800 -->
  <body style="background: oklch(27.9% 0.041 260.031)">
    <div id="root">
      <div class="initial-loader">
        <div class="spinner"></div>
        <div class="initial-loader-msg">&nbsp;</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
